layerrule {
  name = hyprpanel-blur
  no_anim = off
  match:namespace = com.c0dedbad.hyprpanel.client
  blur = true
  blur_popups = false
  ignore_alpha = false
}

layerrule {
  name = wofi-blur
  no_anim = off
  match:namespace = wofi
  blur = true
  blur_popups = false
  ignore_alpha = true
}

layerrule = blur on, match:namespace notifications
